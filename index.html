<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#1c1b1f" />
    <title>SubTrak X — Subscription Intelligence & Optimization</title>
    <meta name="description" content="Database-first fintech system to track, analyze and optimize subscriptions. SQL-powered waste detection, predictions and health scoring." />
    <meta property="og:title" content="SubTrak X — Subscription Intelligence" />
    <meta property="og:description" content="Stop bleeding cash on forgotten subscriptions. SQL-native financial intelligence." />
    <meta property="og:type" content="website" />
    <meta name="twitter:card" content="summary_large_image" />
    <script>
      // M3 theme bootstrap — prevents flash of wrong theme
      (function () {
        try {
          var saved = localStorage.getItem('stx-theme');
          var sys = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
          var theme = saved && saved !== 'system' ? saved : sys;
          document.documentElement.classList.toggle('dark', theme === 'dark');
          document.documentElement.style.colorScheme = theme;
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
